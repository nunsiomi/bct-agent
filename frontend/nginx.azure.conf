server {
    listen 80;
    server_tokens off;

    # ACA internal ingress is HTTPS-only and routes by Host header.
    # Using literal FQDNs in proxy_pass so nginx resolves once at startup
    # and we don't need a resolver directive.

    location /api/task-a/ {
        proxy_pass               https://task-a.internal.lemonbay-7e904144.eastus.azurecontainerapps.io/;
        proxy_http_version       1.1;
        proxy_ssl_server_name    on;
        proxy_ssl_name           task-a.internal.lemonbay-7e904144.eastus.azurecontainerapps.io;
        proxy_set_header         Host              task-a.internal.lemonbay-7e904144.eastus.azurecontainerapps.io;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_read_timeout       120s;
        proxy_send_timeout       120s;
    }

    location /api/task-b/ {
        proxy_pass               https://task-b.internal.lemonbay-7e904144.eastus.azurecontainerapps.io/;
        proxy_http_version       1.1;
        proxy_ssl_server_name    on;
        proxy_ssl_name           task-b.internal.lemonbay-7e904144.eastus.azurecontainerapps.io;
        proxy_set_header         Host              task-b.internal.lemonbay-7e904144.eastus.azurecontainerapps.io;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_read_timeout       120s;
        proxy_send_timeout       120s;
    }

    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
