services:
  task_a:
    build:
      context: .
      dockerfile: task_a/Dockerfile
    container_name: bct_task_a
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./task_a:/app/task_a
      - ./shared:/app/shared
    restart: unless-stopped

  task_b:
    build:
      context: .
      dockerfile: task_b/Dockerfile
    container_name: bct_task_b
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./task_b:/app/task_b
      - ./shared:/app/shared
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: bct_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - task_a
      - task_b
    restart: unless-stopped
